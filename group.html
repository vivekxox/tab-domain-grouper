<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tab Group</title>
  <style>
    :root {
      --bg: #0a0d14;
      --card: #0f141c;
      --card-hover: #131a24;
      --border: #1b2230;
      --border-hover: #2a3342;
      --text: #e6edf3;
      --muted: #6e7681;
      --url: #5b6470;
      --blue: #4d9bff;
      --blue-strong: #2f6bff;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco,
        "Cascadia Code", "Roboto Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* thin blue gradient bar across the very top */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--blue-strong) 35%, #7db4ff 50%, var(--blue-strong) 65%, transparent);
      opacity: 0.85;
      z-index: 10;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 72px 28px 56px;
      animation: fade 0.35s ease both;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* header */
    .head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .head-left {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      min-width: 0;
    }

    .favicon {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      margin-top: 4px;
      filter: saturate(0.9);
    }
    .favicon img { width: 100%; height: 100%; object-fit: contain; }
    .favicon svg { width: 30px; height: 30px; opacity: 0.6; }

    .head-text { min-width: 0; }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.15;
    }

    .collected {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      flex: 0 0 auto;
      background: var(--blue-strong);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 7px 15px;
      border-radius: 999px;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(47, 107, 255, 0.35);
    }

    .rule {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: 30px 0;
    }
    .rule.bottom { margin: 36px 0 22px; }

    /* list of tabs */
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
    }

    .card-title {
      display: block;
      color: var(--blue);
      font-weight: 700;
      font-size: 17px;
      text-decoration: none;
      line-height: 1.3;
      word-break: break-word;
    }
    .card-title:hover { text-decoration: underline; }

    .card-url {
      margin-top: 9px;
      color: var(--url);
      font-size: 13.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* actions */
    .actions { text-align: center; margin: 36px 0 0; }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: #11161f;
      border: 1px solid #232c3b;
      color: #c9d1d9;
      font-family: var(--mono);
      font-size: 15px;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }
    .copy-btn:hover { border-color: #3a4658; background: #151c27; }
    .copy-btn.copied { color: #5fd08a; border-color: #2f6b46; }
    .copy-btn svg { width: 16px; height: 16px; }

    .foot {
      text-align: center;
      color: #4b5563;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 80px 20px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main class="wrap" id="wrap">
    <header class="head">
      <div class="head-left">
        <div class="favicon" id="favicon"></div>
        <div class="head-text">
          <h1 id="domain">&hellip;</h1>
          <p class="collected" id="collected"></p>
        </div>
      </div>
      <span class="badge" id="badge">0 tabs</span>
    </header>

    <hr class="rule" />

    <ul class="list" id="list"></ul>

    <div class="actions">
      <button class="copy-btn" id="copyBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        <span id="copyLabel">Copy all URLs</span>
      </button>
    </div>

    <hr class="rule bottom" />

    <footer class="foot">Tab Domain Grouper&nbsp;&nbsp;&middot;&nbsp;&nbsp;<span id="footDomain"></span></footer>
  </main>

  <script src="group.js"></script>
</body>
</html>
